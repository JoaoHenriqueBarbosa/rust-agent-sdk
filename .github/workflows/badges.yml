name: Badges

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  badges:
    name: Refresh metric badges
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Compute metrics
        id: m
        run: |
          TESTS=$(( $(grep -rn '#\[test\]' src tests --include='*.rs' 2>/dev/null | wc -l) + $(grep -rn '#\[tokio::test\]' src tests --include='*.rs' 2>/dev/null | wc -l) ))
          LOC=$(find . -path ./target -prune -o -name '*.rs' -print | xargs wc -l | tail -1 | awk '{print $1}')
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"
          echo "loc=$LOC" >> "$GITHUB_OUTPUT"
      - name: Write badge endpoints
        run: |
          mkdir -p .github/badges
          printf '{"schemaVersion":1,"label":"tests","message":"%s","color":"brightgreen"}\n' "${{ steps.m.outputs.tests }}" > .github/badges/tests.json
          printf '{"schemaVersion":1,"label":"lines of Rust","message":"%s","color":"blue"}\n' "${{ steps.m.outputs.loc }}" > .github/badges/loc.json
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet .github/badges; then
            git add .github/badges
            git commit -m "ci(badges): refresh metrics [skip ci]"
            git push
          else
            echo "badges unchanged"
          fi
